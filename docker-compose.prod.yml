# ============================================================
# math-rag-knowledge / 数学冒险世界 生产环境 Docker Compose
# 版本: v1.0 (2026-06-02)
# 用法: docker compose -f docker-compose.prod.yml up -d
# 前置: 设置所有 ${ENV_VAR} 环境变量（禁止 .env 文件含密钥）
# ============================================================

services:
  # ===== PostgreSQL 16（生产配置）=====
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      TZ: Asia/Shanghai
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - math-rag-prod
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "2G"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ===== Redis 7（生产配置 — AOF 持久化）=====
  redis:
    image: redis:7-alpine
    restart: always
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - math-rag-prod
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "1G"

  # ===== FastAPI 后端 =====
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    restart: always
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL}
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY}
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
      - ENVIRONMENT=production
      - DEBUG=false
      - LOG_FORMAT=json
      - VALIDATION_SERVICE_URL=http://content-validation:8010
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - math-rag-prod
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "2G"
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  # ===== Content Validation Service =====
  content-validation:
    build:
      context: ./docker/content-validation
      dockerfile: Dockerfile
    restart: always
    networks:
      - math-rag-prod
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"

  # ===== Nginx 反向代理 =====
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - math-rag-prod
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "256M"

volumes:
  pgdata_prod:
  redis_data_prod:

networks:
  math-rag-prod:
    driver: bridge
