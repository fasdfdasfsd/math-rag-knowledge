# Ruff 配置 — math-rag-knowledge
# 替代 Flake8 + isort + pyupgrade 等工具

# 目标 Python 版本
target-version = "py312"

# 启用的规则集
[lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes
    "I",      # isort
    "N",      # pep8-naming
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "SIM",    # flake8-simplify
    "UP",     # pyupgrade
    "RUF",    # Ruff-specific rules
    "TCH",    # flake8-type-checking-imports
    "TID",    # flake8-tidy-imports
]
ignore = [
    "E501",   # 行长度由 formatter 处理，lint 不检查
]

# isort 风格配置
[lint.isort]
known-first-party = ["src"]
force-sort-within-sections = true

# formatter 配置
[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
docstring-code-format = true

# 排除目录
exclude = ["crewAI-IT-docs"]
