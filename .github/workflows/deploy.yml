# CI/CD Pipeline — 数学冒险世界
# 触发: push main 分支 / PR
# 阶段: Lint → TypeCheck → Test → Build → Deploy
name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.7.x"

jobs:
  # ===== Stage 1: Lint & Type Check =====
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}" }
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run mypy src/ --strict

  # ===== Stage 2: Test =====
  test:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_USER: mathrag, POSTGRES_PASSWORD: mathrag_dev, POSTGRES_DB: math_rag }
        options: >-
          --health-cmd "pg_isready -U mathrag -d math_rag"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}" }
      - run: uv sync --frozen
      - run: uv run pytest --cov=src --cov-report=xml --cov-fail-under=80
        env:
          DB_HOST: localhost
          DB_USER: mathrag
          DB_PASSWORD: mathrag_dev
          DB_NAME: math_rag
          REDIS_HOST: localhost
          REDIS_PASSWORD: mathrag_dev
      - uses: codecov/codecov-action@v4
        if: github.event_name == 'push'
        with: { files: coverage.xml }

  # ===== Stage 3: Build Frontend =====
  build-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: cd frontend && npm ci && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ===== Stage 4: Build & Push Docker Images =====
  build-docker:
    needs: [test, build-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: frontend-dist, path: frontend/dist/ }
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
      - uses: docker/build-push-action@v5
        with:
          context: docker/content-validation
          file: docker/content-validation/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/content-validation:${{ github.sha }}

  # ===== Stage 5: Deploy (Manual Gate) =====
  deploy:
    needs: build-docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "Deploy commit: ${{ github.sha }}"
          echo "Run: docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d"
